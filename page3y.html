<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foot Locker - Spin The Wheel</title>
    <link rel="stylesheet" href="style-yassine-new.css" />
  </head>
  <body class="pagey">
    <!-- toggle -->
    <input type="checkbox" id="toggle" hidden />

    <div class="content">
      <header class="top-bar">
        <button class="icon-button back-button" id="backButton" aria-label="Back">
          <img src="assets/backarrow_icon.svg" alt="Back" />
        </button>

        <div class="top-spacer"></div>

        <button
          class="icon-button account-button"
          id="accountButton"
          aria-label="Account"
        >
          <img src="assets/account_icon.svg" alt="Account" />
        </button>
      </header>

      <div class="main-logo-container">
        <img
          src="assets/main_logo.svg"
          alt="Main logo"
          class="main-logo"
        />
      </div>

      <main class="main-layout">
        <section class="wheel-section">
          <div class="wheel-wrapper">
            <img
              src="assets/wheel.png"
              alt="Spin the wheel"
              class="wheel-image"
              id="wheel"
            />

            <!-- go button -->
            <label
              for="toggle"
              class="go-button"
              role="button"
              tabindex="0"
              aria-label="Spin the wheel"
            >
              <img src="assets/go_button.png" alt="Go" />
            </label>
          </div>

          <div class="spin-counter">
            <img
              src="assets/spin_counter.png"
              alt="Remaining spins"
              class="spin-counter-image"
            />
          </div>
        </section>
      </main>

      <footer class="bottom-logo-container">
        <img
          src="assets/footlocker_logo.png"
          alt="Foot Locker logo"
          class="footlocker-logo"
        />
      </footer>
    </div>

    <!-- overlay -->
    <label for="toggle" class="overlay">
      <img src="assets/You_won.png" alt="You won" />
    </label>

  </body>
  </html>
