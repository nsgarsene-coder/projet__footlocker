<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="paramètre.css">
    <title>Document</title>
</head>
<body class="paramètres">
         <div class="container">
           <header class="top-bar">
      <button class="back-btn" id="backButton" aria-label="Back">
        <img src="assets/backarrow_icon.svg" alt="Back" />
      </button>
    </header>
    <h1 class="section-title">Personal<br>Information</h1>

    <div class="input-group">
      <input type="text" placeholder="John Doe">
    </div>
    <div class="input-group">
      <input type="email" placeholder="Johndoe@email.com">
    </div>
    <div class="input-group">
      <input type="tel" placeholder="+33 00 00 00 00 00">
    </div>

    <button class="btn-white">Edit Information</button>
    <div class="separator"></div> 

     <h2 class="section-title">Game Info</h2>

    <div class="info-row">
      <span class="label">Available Spins:</span>
      <span class="value">3 Spins Left.</span>
    </div>
    <div class="info-row">
      <span class="label">Next Free Spin in:</span>
      <span class="value">23:57 Minutes</span>
    </div>
    <div class="info-row">
      <span class="label">Total Points:</span>
      <span class="value">39 points</span>
    </div>
       <div class="separator"></div>

  
    <button class="btn-gray">Convert Points to Spins</button>

    <p class="error-text">Not enough points (need 50 points for 1 spin)</p>

    
    <a href="page7.html" class="btn_a">History of Winnings</a>
    <footer class="bottom-logo-container">
      <img
        src="assets/footlocker_logo.png"
        alt="Foot Locker logo"
        class="footlocker-logo"
      />
    </footer>
</div></body>
</html>
